# ============================================================================
# Plataforma Municipal Integrada — Prefeitura de Laranjal do Jari
# Stack de desenvolvimento/produção. Em produção, Traefik termina o TLS e
# faz roteamento; Coolify/Dokploy orquestram o deploy a partir deste arquivo.
# ============================================================================
services:
  postgres:
    image: postgres:16-alpine
    container_name: ljari_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ljari}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-ljari}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ljari}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ljari_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-change-me}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: ljari_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ljari}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console

  # ---- Observabilidade ----------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: ljari_prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:latest
    container_name: ljari_loki
    restart: unless-stopped
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:latest
    container_name: ljari_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki

volumes:
  pg_data:
  redis_data:
  minio_data:
  prom_data:
  grafana_data:
